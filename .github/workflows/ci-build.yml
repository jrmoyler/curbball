name: CI Build Guard

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "codex/**"

jobs:
  verify-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run -s typecheck

      - name: Production build
        run: npm run -s build
